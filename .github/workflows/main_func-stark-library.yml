# Build and deploy to Azure Functions WITHOUT any third-party (Azure/*) action.
# Fetching Azure/functions-action returns "Repository access blocked" in this
# account, while GitHub-owned actions/* are allowed (the build job proves it). So
# we use only actions/checkout + actions/setup-node, then deploy by POSTing a zip
# to the Kudu zipdeploy endpoint with the existing publish-profile secret. Single
# job on windows-latest because oxigraph is a native module and node_modules must
# match the Windows Function App.

name: Build and deploy Node.js project to Azure Function App - func-stark-library

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20.x' # match the Function App runtime (Node 20 LTS)

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      contents: read # required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Resolve Project Dependencies Using Npm'
        shell: pwsh
        run: |
          npm install
          npm run build --if-present
          npm run smoke:entrypoint
          npm run test --if-present
          npm prune --production

      # Ship only the runtime artifact: compiled output, production node_modules,
      # and the manifests the host needs. 7-Zip is preinstalled on the runner and
      # handles deep node_modules paths better than Compress-Archive.
      - name: 'Package runtime artifact'
        shell: pwsh
        run: |
          $items = @('dist','node_modules','host.json','package.json','package-lock.json','.funcignore') |
            Where-Object { Test-Path $_ }
          7z a -tzip app.zip @items | Out-Null
          if (-not (Test-Path 'app.zip')) { throw 'app.zip was not created' }
          "Packaged: $((Get-Item app.zip).Length) bytes" | Write-Host

      # Deploy via Kudu zipdeploy using the publish profile (no Azure/* action).
      - name: 'Deploy to Azure Functions (Kudu zipdeploy)'
        shell: pwsh
        env:
          PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F1D44B06BF634E9AADD8B80004C10EC7 }}
        run: |
          $ErrorActionPreference = 'Stop'
          [xml]$pp = $env:PUBLISH_PROFILE
          $profile = $pp.publishData.publishProfile |
            Where-Object { $_.publishMethod -eq 'ZipDeploy' } | Select-Object -First 1
          if (-not $profile) {
            $profile = $pp.publishData.publishProfile |
              Where-Object { $_.publishMethod -eq 'MSDeploy' } | Select-Object -First 1
          }
          if (-not $profile) { throw 'No ZipDeploy/MSDeploy entry in publish profile' }

          $scmHost = ($profile.publishUrl -replace '^https?://','') -replace '/.*$','' -replace ':\d+$',''
          $pair = "$($profile.userName):$($profile.userPWD)"
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          $headers = @{ Authorization = "Basic $auth" }

          # Async zipdeploy: the sync endpoint blocks for the whole extract+restart and the
          # Azure gateway returns 504 (~110s). isAsync=true returns 202 immediately with a
          # Location to poll, so we wait on the real deployment status instead of the gateway.
          $deployUri = "https://$scmHost/api/zipdeploy?isAsync=true"
          Write-Host "Uploading app.zip to $deployUri"
          $resp = Invoke-WebRequest -Uri $deployUri -Method POST -InFile 'app.zip' `
            -ContentType 'application/zip' -Headers $headers -TimeoutSec 600
          Write-Host "Upload accepted: HTTP $($resp.StatusCode)"

          $pollUrl = $resp.Headers.Location
          if ($pollUrl -is [array]) { $pollUrl = $pollUrl[0] }
          if (-not $pollUrl) { $pollUrl = "https://$scmHost/api/deployments/latest" }
          Write-Host "Polling deployment status at $pollUrl"

          $deadline = (Get-Date).AddMinutes(10)
          while ($true) {
            Start-Sleep -Seconds 5
            try {
              $status = Invoke-RestMethod -Uri $pollUrl -Headers $headers -TimeoutSec 120
            } catch {
              if ((Get-Date) -gt $deadline) { throw }
              Write-Host "  (transient poll error: $($_.Exception.Message))"
              continue
            }
            Write-Host "  status=$($status.status) complete=$($status.complete) $($status.statusText)"
            if ($status.complete -eq $true -or $status.status -eq 4 -or $status.status -eq 3) {
              if ($status.status -eq 4) { Write-Host 'Deployment succeeded.'; break }
              throw "Deployment failed (status=$($status.status)): $($status.statusText)"
            }
            if ((Get-Date) -gt $deadline) { throw 'Timed out waiting for deployment to complete.' }
          }
